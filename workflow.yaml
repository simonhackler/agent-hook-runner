name: repo-quality
target: codex-stop
fail_strategy: stop-first

steps:
  - id: pyright
    description: Run pyright against the repository
    run: uv
    args:
      - run
      - --project
      - "{{ cwd }}"
      - pyright
    cwd: "{{ cwd }}"
    on_error: Pyright reported type errors. Fix them before continuing.
  - id: ruff
    description: Run ruff against the repository
    run: uv
    args:
      - run
      - --project
      - "{{ cwd }}"
      - ruff
      - check
    cwd: "{{ cwd }}"
    on_error: Ruff reported lint errors. Fix them before continuing.
  - id: pytest
    description: Run pytest against the repository
    run: uv
    args:
      - run
      - --project
      - "{{ cwd }}"
      - pytest
      - -q
    cwd: "{{ cwd }}"
    on_error: Pytest reported failing tests. Fix them before continuing.
